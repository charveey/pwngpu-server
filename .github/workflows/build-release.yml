name: Build and Release

# Runs whenever a tag like v1.0.0 is pushed.
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # needed to create the GitHub Release and upload assets

jobs:
  build-windows-exe:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build exe
        # Mirrors build_exe.bat
        run: |
          python -m PyInstaller --noconfirm --onefile --windowed --name "PwnGPUServer" main.py

      - name: Zip the exe for the release asset
        run: |
          Compress-Archive -Path dist\PwnGPUServer.exe -DestinationPath dist\PwnGPUServer-${{ github.ref_name }}-win64.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/PwnGPUServer.exe
            dist/PwnGPUServer-${{ github.ref_name }}-win64.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
